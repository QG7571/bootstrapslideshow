<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap Links -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <link rel="stylesheet" href="styles/main.css">

  <title>Bootstrap Slideshow</title>
  <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">
</head>

<body>
  <div class="p-5 bg-primary text-white text-center">
    <img src="images/logofrog.png" alt="Frog Logo">
    <div>
    <h1>My First Bootstrap 5 Page</h1>
    <p>Resize this responsive page to see the effect!</p>
    </div>
  </div>

  <nav class="navbar navbar-expand-sm bg-dark navbar-dark">
    <div class="container-fluid">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link active" href="#">Active</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Link</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Link</a>
        </li>
        <li class="nav-item">
          <a class="nav-link disabled" href="#">Disabled</a>
        </li>
      </ul>
    </div>
  </nav>

  <div id="demo" class="carousel slide" data-bs-ride="carousel">

    <!-- Indicators/dots -->
    <div class="carousel-indicators">
      <button type="button" data-bs-target="#demo" data-bs-slide-to="0" class="active"></button>
      <button type="button" data-bs-target="#demo" data-bs-slide-to="1"></button>
      <button type="button" data-bs-target="#demo" data-bs-slide-to="2"></button>
      <button type="button" data-bs-target="#demo" data-bs-slide-to="3"></button>
      <button type="button" data-bs-target="#demo" data-bs-slide-to="4"></button>
      <button type="button" data-bs-target="#demo" data-bs-slide-to="5"></button>
      <button type="button" data-bs-target="#demo" data-bs-slide-to="6"></button>
      <button type="button" data-bs-target="#demo" data-bs-slide-to="7"></button>
      <button type="button" data-bs-target="#demo" data-bs-slide-to="8"></button>
      <button type="button" data-bs-target="#demo" data-bs-slide-to="9"></button>
      <button type="button" data-bs-target="#demo" data-bs-slide-to="10"></button>
      <button type="button" data-bs-target="#demo" data-bs-slide-to="11"></button>
      <button type="button" data-bs-target="#demo" data-bs-slide-to="12"></button>
    </div>

    <!-- The slideshow/carousel -->
    <div class="carousel-inner">
      <div class="carousel-item active">
        <img src="images/frog_01.jpg" alt="Frog the First" class="d-block">
      </div>
      <div class="carousel-item">
        <img src="images/frog_02.jpg" alt="Frog the Second" class="d-block">
      </div>
      <div class="carousel-item">
        <img src="images/frog_03.jpg" alt="Frog the Third" class="d-block">
      </div>
      <div class="carousel-item">
        <img src="images/frog_04.jpg" alt="Frog the Fourth" class="d-block">
      </div>
      <div class="carousel-item">
        <img src="images/frog_05.jpg" alt="Frog the Fifth" class="d-block">
      </div>
      <div class="carousel-item">
        <img src="images/frog_06.jpg" alt="Frog the Sixth" class="d-block">
      </div>
      <div class="carousel-item">
        <img src="images/frog_07.jpg" alt="Frog the Seventh" class="d-block">
      </div>
      <div class="carousel-item">
        <img src="images/frog_08.jpg" alt="Frog the Eighth" class="d-block">
      </div>
      <div class="carousel-item">
        <img src="images/frog_09.jpg" alt="Frog the Ninth" class="d-block">
      </div>
      <div class="carousel-item">
        <img src="images/frog_10.jpg" alt="Frog the Tenth" class="d-block">
      </div>
      <div class="carousel-item">
        <img src="images/frog_11.jpg" alt="Frog the Eleventh" class="d-block">
      </div>
      <div class="carousel-item">
        <img src="images/frog_12.jpg" alt="Frog the Twelfth" class="d-block">
      </div>
      <div class="carousel-item">
        <img src="images/frog_13.jpg" alt="The accursed Thirteenth Frog, who infiltrated this noble webpage with his sinister and cruel sorcery, and profanes my page with his despicable presence.  He will be boiled, and burned, and summarily destroyed for his many, many crimes" class="d-block">
      </div>
    </div>
  </div>

  <div class="mt-5 p-4 bg-dark text-white text-center">
    <p> &copy; <span id="copyright"></span> Quentin Gangle</p>
  </div>

</body>

</html>
<script src="js/scripts.js"></script>
